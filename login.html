<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Crimson+Pro">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/layout.css">
    <script src="https://cdn.jsdelivr.net/npm/pouchdb@8.0.1/dist/pouchdb.min.js"></script>
    <script src="js/auth.js" type="module"></script>
    <script src="js/main.js" type="module"></script>
</head>
<body class="page-auth">
    <div id="container-login" class="auth-card animar-entrada">
        <h1>LOGIN</h1>
        <div class="auth-inputs">
            <input id="email-login" type="email" placeholder="E-mail">
            <input id="senha-login" type="password" placeholder="Senha"> 
        </div>

        <p id="msg-erro" style="color: #ff6b6b; font-size: 0.85rem; margin-bottom: 1rem; font-family: 'Montserrat', sans-serif; min-height: 1.2rem;"></p>

        <button id="btn-login" class="btn-primary w-100 mb-3">ENTRAR</button>
        <a href="#" id="link-cadastro" class="auth-toggle-link">Não tem conta? Cadastre-se</a>
    </div>

    <div id="container-cadastro" class="auth-card hidden animar-entrada">
        <h1>CADASTRO</h1>
        <div class="auth-inputs">
            <input id="nome-cad" type="text" placeholder="Nome">
            <input id="email-cad" type="email" placeholder="E-mail">
            <input id="senha-cad" type="password" placeholder="Senha"> 
        </div>

        <p id="msg-erro-cad" style="color: #ff6b6b; font-size: 0.85rem; margin-bottom: 1rem; font-family: 'Montserrat', sans-serif; min-height: 1.2rem;"></p>

        <button id="btn-cadastrar" class="btn-primary w-100 mb-3">CADASTRAR</button>
        <a href="#" id="link-login" class="auth-toggle-link">Já tem conta? Faça Login</a>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Crimson+Pro">
    <link rel="stylesheet" href="css/global.css">
    <script src="js/auth.js" defer></script>
</head>
<body class="centered">
    <div class="login-container centered mb-4 animar-entrada">
        <h1 class="pb-4">LOGIN</h1>
        <input id="email" type="text" placeholder="E-mail">
        <input id="senha" type="text" placeholder="Senha"> 
        <div class="centered mt-3">
            <button class="mb-3">ENTRAR</button>
            <a href="#" onclick="alternarTelas()" class="nav-link small">CADASTRE-SE</a>
        </div>         
    </div>

    <div class="register-container centered hidden animar-entrada">
        <h1 class="pb-4">CADASTRO</h1>
        <input id="nome" type="text" placeholder="Nome">
        <input id="email" type="text" placeholder="E-mail">
        <input id="senha" type="text" placeholder="Senha"> 
        <div class="centered mt-3">
            <button class="mb-3">CADASTRAR</button>
            <a href="#" onclick="alternarTelas()" class="nav-link small">LOGIN</a>
        </div>         
    </div>
</body>
</html>
